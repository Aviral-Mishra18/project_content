services:
  # Backend Web Service
  - type: web
    name: aura-social-backend
    env: node
    region: ohio
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: PORT
        value: "10000"
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false # They need to set this in the Render dashboard
      - key: GEMINI_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false

  # Frontend Static Site
  - type: web
    name: aura-social-frontend
    env: static
    region: ohio
    rootDir: content-muse
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: aura-social-backend
          envVarKey: RENDER_EXTERNAL_URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
